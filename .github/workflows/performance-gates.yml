name: Performance Gates

on:
  pull_request:
  workflow_dispatch:

jobs:
  performance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run performance gate tests
        run: |
          set -o pipefail
          npm run test -- tests/integration/performance/workspace-performance.test.ts tests/integration/performance/node-interaction-budget.test.ts tests/integration/performance/view-switch-budget.test.ts tests/integration/performance/generation-latency-budget.test.ts | tee performance-gates.log

      - name: Upload performance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: performance-gates-log
          path: performance-gates.log
