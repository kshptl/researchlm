name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-desktop:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 75
    permissions:
      contents: write
    env:
      WINDOWS_CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
      WINDOWS_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
      WINDOWS_CSC_NAME: ${{ secrets.WINDOWS_CSC_NAME }}
      MACOS_CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
      MACOS_CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
      MACOS_CSC_NAME: ${{ secrets.MACOS_CSC_NAME }}
      APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      LINUX_GPG_PRIVATE_KEY: ${{ secrets.LINUX_GPG_PRIVATE_KEY }}
      LINUX_GPG_PASSPHRASE: ${{ secrets.LINUX_GPG_PASSPHRASE }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop artifacts (Windows signed)
        if: matrix.os == 'windows-latest' && env.WINDOWS_CSC_LINK != '' && env.WINDOWS_CSC_KEY_PASSWORD != ''
        env:
          CSC_LINK: ${{ env.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ env.WINDOWS_CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ env.WINDOWS_CSC_NAME }}
          WIN_CSC_LINK: ${{ env.WINDOWS_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ env.WINDOWS_CSC_KEY_PASSWORD }}
        run: npm run dist:desktop

      - name: Build desktop artifacts (Windows unsigned)
        if: matrix.os == 'windows-latest' && (env.WINDOWS_CSC_LINK == '' || env.WINDOWS_CSC_KEY_PASSWORD == '')
        run: npm run dist:desktop

      - name: Prepare Apple API key file
        if: matrix.os == 'macos-latest' && env.MACOS_CSC_LINK != '' && env.MACOS_CSC_KEY_PASSWORD != '' && env.APPLE_API_KEY_BASE64 != '' && env.APPLE_API_KEY_ID != '' && env.APPLE_API_ISSUER != ''
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          KEY_PATH="$KEY_PATH" node -e "require('node:fs').writeFileSync(process.env.KEY_PATH, Buffer.from(process.env.APPLE_API_KEY_BASE64, 'base64'))"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build desktop artifacts (macOS signed)
        if: matrix.os == 'macos-latest' && env.MACOS_CSC_LINK != '' && env.MACOS_CSC_KEY_PASSWORD != ''
        env:
          CSC_LINK: ${{ env.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ env.MACOS_CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ env.MACOS_CSC_NAME }}
          APPLE_API_KEY_ID: ${{ env.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ env.APPLE_API_ISSUER }}
          APPLE_ID: ${{ env.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ env.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
        run: npm run dist:desktop

      - name: Build desktop artifacts (macOS unsigned)
        if: matrix.os == 'macos-latest' && (env.MACOS_CSC_LINK == '' || env.MACOS_CSC_KEY_PASSWORD == '')
        run: npm run dist:desktop

      - name: Build desktop artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run dist:desktop

      - name: Generate release checksums
        run: npm run checksums:release -- --label "${{ matrix.os }}"

      - name: Sign Linux checksums (GPG)
        if: matrix.os == 'ubuntu-latest' && env.LINUX_GPG_PRIVATE_KEY != '' && env.LINUX_GPG_PASSPHRASE != ''
        run: |
          set -euo pipefail
          KEY_FILE="$RUNNER_TEMP/linux-release-signing.key"
          echo "$LINUX_GPG_PRIVATE_KEY" | base64 --decode > "$KEY_FILE"
          gpg --batch --import "$KEY_FILE"
          gpg \
            --batch \
            --yes \
            --pinentry-mode loopback \
            --passphrase "$LINUX_GPG_PASSPHRASE" \
            --armor \
            --detach-sign \
            --output "release/SHA256SUMS-${{ matrix.os }}.txt.asc" \
            "release/SHA256SUMS-${{ matrix.os }}.txt"

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.dmg
            release/**/*.zip
            release/**/*.exe
            release/**/*.AppImage
            release/**/*.deb
            release/SHA256SUMS-*.txt
            release/SHA256SUMS-*.txt.asc
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts on manual run
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: release/**
